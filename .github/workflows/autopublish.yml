name: Cross-Post to Dev.to
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Clean Front-matter for Dev.to
        # 这一步用 Python 自动把标签砍到 4 个以内，并清理冗余字段
        run: |
          python3 -c "
          import os, re
          for f in os.listdir('.'):
              if f.endswith('.md') and f != 'README.md':
                  with open(f, 'r') as file:
                      content = file.read()
                  # 核心：只保留 title, description, tags, cover_image, published
                  # 自动把 tags 限制在前 4 个
                  content = re.sub(r'tags: (.*)', lambda m: 'tags: ' + ', '.join(m.group(1).split(',')[:4]), content)
                  # 兼容 cover 字段
                  content = content.replace('cover:', 'cover_image:')
                  with open(f, 'w') as file:
                      file.write(content)
          "

      - name: Publish to Dev.to
        uses: sinedied/publish-devto@v2
        with:
          devto_key: ${{ secrets.DEVTO_API_KEYS }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          files: "*.md"
