name: Cross-Post to Dev.to & Medium
on:
  push:
    branches: [ main ]
    paths: [ 'posts/**.md' ] # 监听 posts 文件夹下的 md 变动

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Publish to Dev.to
        uses: sinedied/publish-devto@v2
        with:
          devto_key: ${{ secrets.DEVTO_API_KEYS }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          base_url: https://insights.vltaai.com/ # 你的 Hashnode 域名
          conventional_commits: true

      
