name: Cross-Post to Dev.to
on:
  push:
    branches: [ main ]
    # 暂时去掉具体的 paths 限制，确保任何推送到 main 的改动都能触发
    # 这样当你修改本 yml 文件时，它也会立即跑一次给你看效果

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Publish to Dev.to
        uses: sinedied/publish-devto@v2
        with:
          devto_key: ${{ secrets.DEVTO_API_KEYS }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          base_url: https://insights.vltaai.com/
          conventional_commits: true
